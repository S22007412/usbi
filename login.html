<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Control de Adeudos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=block" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet"/>
    
    <link rel="stylesheet" href="/login.css">
</head>
<body>
    <div class="main-container">
        <div class="login-wrapper">
            
            <div class="header-section">
                <div class="logo-box">
                    <span class="material-symbols-outlined logo-icon">library_books</span>
                </div>
                <h1>Biblioteca</h1>
                <p class="subtitle">Sistema de Control de Adeudos</p>
            </div>

            <div class="login-card">
                <div class="card-header">
                    <h2>Bienvenido de nuevo</h2>
                    <p>Por favor ingrese sus credenciales para acceder.</p>
                </div>
                
                <!-- FIXED: Changed action to # and added id for JavaScript -->
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">person</span>
                            <input type="text" id="username" name="username" placeholder="Ingrese su usuario" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="loginBtn">
                            <span class="btn-text">Iniciar Sesión</span>
                            <span class="btn-loading" style="display: none;">Cargando...</span>
                        </button>
                    </div>
                </form>

                <div class="card-footer">
                    <p>© 2026 Sistema de Control de Adeudos.</p>
                </div>
            </div>
        </div>

        <div class="background-blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>
    </div>

    

    <script>
        

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                toast.addEventListener('animationend', () => toast.remove());
            }, 4000);
        }

        // LOGIN FORM HANDLER - THIS WAS MISSING!
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = loginBtn.querySelector('.btn-text');
        const btnLoading = loginBtn.querySelector('.btn-loading');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent default form submission
            
            console.log('Form submitted'); // Debug
            
            // Show loading state
            loginBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            
            // Get form data
            const formData = new FormData(loginForm);
            
            console.log('Sending to: /biblioteca/api/login.php'); // Debug
            
            try {
                const response = await fetch('/biblioteca/api/login.php', {
                    method: 'POST',
                    body: formData
                });
                
                console.log('Response status:', response.status); // Debug
                
                const data = await response.json();
                console.log('Response data:', data); // Debug
                
                if (data.success) {
                    showToast(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect || '/index.html';
                    }, 1500);
                } else {
                    showToast(data.message, 'error');
                    loginBtn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';
                }
            } catch (error) {
                console.error('Login error:', error);
                showToast('Error de conexión. Por favor intente nuevamente.', 'error');
                
                // Reset Button
                loginBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        });
    </script>

    <!-- Notificaciones Toast -->
    <div class="toast-container" id="toast-container"></div>
</body>
</html>
