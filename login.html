<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesíon - Sistema de control de biblioteca</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="main-container">
        <div class="login-wrapper">
            
            <div class="header-section">
                <div class="logo-box">
                    <span class="material-symbols-outlined logo-icon">library_books</span>
                </div>
                <h1>Biblioteca</h1>
                <p class="subtitle">Sistema de Control de Devoluciones</p>
            </div>

            <div class="login-card">
                <div class="card-header">
                    <h2>Bienvenido de nuevo</h2>
                    <p>Por favor ingrese sus credenciales para acceder.</p>
                </div>
                
                <form action = "biblioteca/api/login.php" method="POST" class="login-form">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">person</span>
                            <input type="text" id="username" name="username" placeholder="Ingrese su usuario">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <input type="password" id="password" name="password" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Iniciar Sesión</button>
                    </div>
                </form>

                <div class="card-footer">
                    <p>© 2026 Sistema de Biblioteca. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>

        <div class="background-blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>
    </div>

    <button id="theme-toggle" aria-label="Cambiar modo oscuro">
        <span class="material-symbols-outlined icon-sun">light_mode</span>
        <span class="material-symbols-outlined icon-moon">dark_mode</span>
    </button>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
